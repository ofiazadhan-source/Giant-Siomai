<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIANT SIOMAI POS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:20px;}
.header {display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
.header h1 {font-size:22px; color:#ff6b35;}
.container {display:grid; grid-template-columns: 2fr 1fr; gap:20px;}
.products, .cart {background:white; padding:20px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.product-grid {display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:12px;}
.product-card {border:2px solid #eee; padding:15px; border-radius:10px; text-align:center; cursor:pointer; transition:0.2s;}
.product-card:hover {border-color:#ff6b35; transform:translateY(-2px);}
.product-name {font-weight:700; margin-bottom:5px;}
.product-price {color:#ff6b35; font-weight:600;}
.cart-item {display:flex; justify-content:space-between; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #eee;}
.total {font-size:20px; font-weight:700; margin:15px 0;}
.btn {width:100%; padding:12px; background:#ff6b35; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-size:16px;}
.btn:hover {background:#e55a2b;}
.btn:disabled {background:#ccc; cursor:not-allowed;}
@media (max-width:768px) {
  .container {grid-template-columns: 1fr;}
}
</style>
</head>
<body>

<div class="header">
  <h1>💻 DHAN SIOMAI POS</h1>
  <a href="index.html" style="color:#ff6b35; text-decoration:none; font-weight:600;">← Back</a>
</div>

<div class="container">
  <!-- Products -->
  <div class="products">
    <h3 style="margin-bottom:15px;">Products</h3>
    <div class="product-grid" id="productList">
      Loading products...
    </div>
  </div>

  <!-- Cart -->
  <div class="cart">
    <h3 style="margin-bottom:15px;">Cart</h3>
    <div id="cartItems">Empty cart</div>
    <div class="total">Total: ₱<span id="total">0</span></div>
    <button class="btn" id="checkoutBtn" onclick="checkout()" disabled>Checkout</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let cart = [];
let products = [];

// Load products from Firestore
db.collection("products").onSnapshot(snapshot => {
  products = [];
  snapshot.forEach(doc => {
    products.push({id: doc.id, ...doc.data()});
  });
  renderProducts();
});

function renderProducts() {
  const list = document.getElementById("productList");
  if(products.length === 0) {
    list.innerHTML = "No products yet. Add sa products.html";
    return;
  }
  list.innerHTML = products.map(p => `
    <div class="product-card" onclick="addToCart('${p.id}')">
      <div class="product-name">${p.name}</div>
      <div class="product-price">₱${p.price}</div>
      <div style="font-size:12px; color:#666;">Stock: ${p.stock || 0}</div>
    </div>
  `).join('');
}

function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  const existing = cart.find(item => item.id === productId);
  
  if(existing) {
    existing.qty += 1;
  } else {
    cart.push({...product, qty: 1});
  }
  renderCart();
}

function removeFromCart(productId) {
  cart = cart.filter(item => item.id !== productId);
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cartItems");
  const totalSpan = document.getElementById("total");
  const checkoutBtn = document.getElementById("checkoutBtn");
  
  if(cart.length === 0) {
    cartDiv.innerHTML = "Empty cart";
    totalSpan.textContent = "0";
    checkoutBtn.disabled = true;
    return;
  }
  
  let total = 0;
  cartDiv.innerHTML = cart.map(item => {
    total += item.price * item.qty;
    return `
      <div class="cart-item">
        <div>${item.name} x${item.qty}</div>
        <div>₱${item.price * item.qty} <button onclick="removeFromCart('${item.id}')" style="border:none; background:none; color:red; cursor:pointer;">x</button></div>
      </div>
    `;
  }).join('');
  
  totalSpan.textContent = total;
  checkoutBtn.disabled = false;
}

async function checkout() {
  if(cart.length === 0) return;
  
  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  
  try {
    await db.collection("sales").add({
      items: cart,
      total: total,
      date: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    alert("Sale recorded!");
    cart = [];
    renderCart();
  } catch(e) {
    alert("Error: " + e.message);
  }
}
</script>
</body>
</html>
