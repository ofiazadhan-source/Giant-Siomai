<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Production - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5;}
.header {background: linear-gradient(135deg, #ff6b35, #ff8c65); color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;}
.container {padding:15px; max-width:1100px; margin:0 auto;}
.notice {background:#e8f5e9; color:#2e7d32; padding:12px; border-radius:8px; margin-bottom:15px; font-size:14px;}
.add-btn {background:#ff6b35; color:white; border:none; padding:10px 16px; border-radius:8px; font-weight:600; cursor:pointer; margin-bottom:15px;}
.table {width:100%; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); border-collapse:collapse;}
.table th {background:#fff9c4; padding:12px; text-align:left; font-weight:700; font-size:14px;}
.table td {padding:10px; border-bottom:1px solid #eee;}
.table input,.table select {width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:14px;}
.btn-save {background:#4caf50; color:white; padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer;}
.btn-back {background:#666; color:white; padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer; margin-right:10px;}
.btn-del {background:#f44336; color:white; padding:6px 10px; border:none; border-radius:6px; cursor:pointer;}
.loading {text-align:center; padding:40px; color:#666;}
</style>
</head>
<body>
<div class="header">
<h1>📊 Daily Production</h1>
<button onclick="window.location.href='index.html'" style="padding:8px 14px; border:none; border-radius:8px; font-weight:600; cursor:pointer; background:#fff; color:#ff6b35;">← Back</button>
</div>
<div class="container">
<div class="notice">💡 Piliin mo yung product sa dropdown. Walang typing, walang mali.</div>
<button class="add-btn" onclick="addDaily()">+ Add Daily Record</button>
<div id="dailyList"><div class="loading">Loading...</div></div>
<br>
<button class="btn-back" onclick="window.location.href='index.html'">Back</button>
<button class="btn-save" onclick="saveDaily()">💾 Save All</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let dailyArray = [];
let productsArray = [];

window.onload = function() {
  loadProducts();
  loadDaily();
}

function loadProducts() {
  db.collection("dhan-pos-web").get().then(snap => {
    productsArray = [];
    snap.forEach(doc => {
      let p = doc.data();
      p.id = doc.id;
      productsArray.push(p);
    });
    renderDaily();
  });
}

function loadDaily() {
  db.collection("dhan-daily").orderBy("date", "desc").get().then(snap => {
    dailyArray = [];
    snap.forEach(doc => {
      let d = doc.data();
      d.id = doc.id;
      dailyArray.push(d);
    });
    renderDaily();
  });
}

function renderDaily() {
  if(dailyArray.length === 0) {
    document.getElementById('dailyList').innerHTML = '<div class="loading">No records yet</div>';
    return;
  }
  
  let html = `<table class="table"><tr><th>Date</th><th>Product</th><th>Qty</th><th>Action</th></tr>`;
  dailyArray.forEach(d => {
    let options = `<option value="">-- Select Product --</option>`;
    productsArray.forEach(p => {
      let selected = p.id === d.productId? 'selected' : '';
      options += `<option value="${p.id}" ${selected}>${p.name}</option>`;
    });
    
    html += `<tr>
      <td><input type="date" id="date-${d.id}" value="${d.date}"></td>
      <td><select id="prod-${d.id}">${options}</select></td>
      <td><input type="number" id="qty-${d.id}" value="${d.qty || 0}" min="0"></td>
      <td><button class="btn-del" onclick="deleteDaily('${d.id}')">Delete</button></td>
    </tr>`;
  });
  html += `</table>`;
  document.getElementById('dailyList').innerHTML = html;
}

function addDaily() {
  if(productsArray.length === 0){
    alert("Wala pang product. Mag-add ka muna sa Products page.");
    return;
  }
  
  let date = new Date().toISOString().split('T')[0];
  let firstProduct = productsArray[0];
  
  db.collection("dhan-daily").add({
    date: date, 
    productId: firstProduct.id,
    productName: firstProduct.name,
    qty: 0
  }).then(loadDaily);
}

async function saveDaily() {
  if(!confirm("Save all changes?")) return;
  
  try {
    const batch = db.batch();
    let updatedCount = 0;

    for(const d of dailyArray) {
      let qty = parseInt(document.getElementById(`qty-${d.id}`).value) || 0;
      let productId = document.getElementById(`prod-${d.id}`).value;
      let date = document.getElementById(`date-${d.id}`).value;
      
      if(qty > 0 && productId){
        batch.update(db.collection("dhan-pos-web").doc(productId), { 
          stock: firebase.firestore.FieldValue.increment(qty) 
        });
        updatedCount++;
        
        let prod = productsArray.find(p => p.id === productId);
        
        batch.update(db.collection("dhan-daily").doc(d.id), { 
          date: date, 
          productId: productId,
          productName: prod? prod.name : "",
          qty: qty 
        });
      } else {
        batch.update(db.collection("dhan-daily").doc(d.id), { 
          date: date, 
          productId: productId,
          productName: "",
          qty: qty 
        });
      }
    }

    await batch.commit();
    alert(`✅ Saved! ${updatedCount} product stock updated.`);
    loadDaily();
    loadProducts();
    
  } catch(err) {
    alert("❌ Error: " + err.message);
  }
}

function deleteDaily(id) {
  if(confirm("Delete record?")) db.collection("dhan-daily").doc(id).delete().then(loadDaily);
}
</script>
</body>
</html>
