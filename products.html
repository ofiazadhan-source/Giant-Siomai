<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5;}
.header {background: linear-gradient(135deg, #ff6b35, #ff8c65); color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;}
.container {padding:15px; max-width:1100px; margin:0 auto;}
.notice {background:#e8f5e9; color:#2e7d32; padding:12px; border-radius:8px; margin-bottom:15px; font-size:14px;}
.add-btn {background:#ff6b35; color:white; border:none; padding:10px 16px; border-radius:8px; font-weight:600; cursor:pointer; margin-bottom:15px;}
.table {width:100%; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); border-collapse:collapse;}
.table th {background:#fff9c4; padding:12px; text-align:left; font-weight:700; font-size:14px;}
.table td {padding:10px; border-bottom:1px solid #eee;}
.table input {width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:14px;}
.btn-save {background:#4caf50; color:white; padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer;}
.btn-back {background:#666; color:white; padding:10px 20px; border:none; border-radius:8px; font-weight:600; cursor:pointer; margin-right:10px;}
.btn-del {background:#f44336; color:white; padding:6px 10px; border:none; border-radius:6px; cursor:pointer;}
.loading {text-align:center; padding:40px; color:#666;}
</style>
</head>
<body>
<div class="header">
<h1>📦 Products</h1>
<button onclick="window.location.href='index.html'" style="padding:8px 14px; border:none; border-radius:8px; font-weight:600; cursor:pointer; background:#fff; color:#ff6b35;">← Back</button>
</div>
<div class="container">
<div class="notice">💡 Baguhin mo name, category, price, stock, image URL. Click Save All pag tapos.</div>
<button class="add-btn" onclick="addProduct()">+ Add Product</button>
<div id="productsList"><div class="loading">Loading...</div></div>
<br>
<button class="btn-back" onclick="window.location.href='index.html'">Back</button>
<button class="btn-save" onclick="saveProducts()">💾 Save All</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
let productsArray = [];
let categories = new Set();

window.onload = loadProducts;

function loadProducts() {
  db.collection("dhan-daily").get().then(snap => {
    productsArray = [];
    categories = new Set();
    snap.forEach(doc => {
      let p = doc.data();
      p.id = doc.id;
      p.name = p.name || "Unnamed";
      p.category = p.category || "Uncategorized";
      p.price = p.price || 0;
      p.stock = p.stock || 0;
      p.imageURL = p.imageURL || "";
      productsArray.push(p);
      categories.add(p.category);
    });
    renderProducts();
  });
}

function renderProducts() {
  if(productsArray.length === 0) {
    document.getElementById('productsList').innerHTML = '<div class="loading">No products yet</div>';
    return;
  }
  let html = `<table class="table"><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Image URL</th><th>Action</th></tr>`;
  productsArray.forEach(prod => {
    html += `<tr>
      <td><input id="name-${prod.id}" value="${prod.name}"></td>
      <td><input id="cat-${prod.id}" value="${prod.category}" list="catList"></td>
      <td><input type="number" id="price-${prod.id}" value="${prod.price}"></td>
      <td><input type="number" id="stock-${prod.id}" value="${prod.stock}"></td>
      <td><input id="img-${prod.id}" value="${prod.imageURL}"></td>
      <td><button class="btn-del" onclick="deleteProduct('${prod.id}')">Delete</button></td>
    </tr>`;
  });
  html += `</table><datalist id="catList">${Array.from(categories).map(c => `<option value="${c}">`).join('')}</datalist>`;
  document.getElementById('productsList').innerHTML = html;
}

function addProduct() {
  let name = prompt("Product name:");
  if(!name) return;
  let cat = prompt("Category:", "Big SIOMAI");
  db.collection("dhan-daily").add({
    name, 
    category: cat, 
    price: 0, 
    stock: 0, 
    imageURL: ""
  }).then(loadProducts);
}

async function saveProducts() {
  if(!confirm("Save all changes?")) return;
  try {
    const batch = db.batch();
    productsArray.forEach(prod => {
      batch.update(db.collection("dhan-daily").doc(prod.id), {
        name: document.getElementById(`name-${prod.id}`).value,
        category: document.getElementById(`cat-${prod.id}`).value,
        price: parseFloat(document.getElementById(`price-${prod.id}`).value) || 0,
        stock: parseInt(document.getElementById(`stock-${prod.id}`).value) || 0,
        imageURL: document.getElementById(`img-${prod.id}`).value
      });
    });
    await batch.commit();
    alert("✅ Saved!");
    loadProducts();
  } catch(err) {
    alert("❌ Error: " + err.message);
  }
}

function deleteProduct(id) {
  if(confirm("Delete product?")) 
    db.collection("dhan-daily").doc(id).delete().then(loadProducts);
}
</script>
</body>
</html>
