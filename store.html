<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Management - DHAN SIOMAI Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div class="bg-orange-500 p-4 flex justify-between items-center">
    <h1 class="text-white text-xl font-bold">🏪 Store Settings</h1>
    <a href="index.html" class="bg-white px-3 py-1 rounded text-orange-500 font-semibold">Back</a>
  </div>

  <div class="p-4 max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <h2 class="font-bold mb-3">Store Information</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-sm text-gray-600">Store Name</label>
          <input id="storeName" type="text" class="w-full border rounded p-2" placeholder="DHAN SIOMAI">
        </div>
        <div>
          <label class="block text-sm text-gray-600">Address</label>
          <input id="storeAddress" type="text" class="w-full border rounded p-2" placeholder="Your store address">
        </div>
        <div>
          <label class="block text-sm text-gray-600">Contact Number</label>
          <input id="storeContact" type="text" class="w-full border rounded p-2" placeholder="09XX XXXX">
        </div>
        <button onclick="saveStoreInfo()" class="w-full bg-orange-500 text-white py-2 rounded font-semibold">
          Save Store Info
        </button>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script>
    const db = firebase.firestore();

    // Load store info on page load
    window.onload = async () => {
      const doc = await db.collection('settings').doc('store').get();
      if (doc.exists) {
        const data = doc.data();
        document.getElementById('storeName').value = data.name || '';
        document.getElementById('storeAddress').value = data.address || '';
        document.getElementById('storeContact').value = data.contact || '';
      }
    };

    async function saveStoreInfo() {
      const data = {
        name: document.getElementById('storeName').value,
        address: document.getElementById('storeAddress').value,
        contact: document.getElementById('storeContact').value
      };
      
      await db.collection('settings').doc('store').set(data);
      alert('Store info saved successfully!');
    }
  </script>
</body>
</html>
