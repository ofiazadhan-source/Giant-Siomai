<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - DHAN SIOMAI Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
<div class="bg-orange-500 p-4 flex justify-between items-center">
<h1 class="text-white text-xl font-bold">💰 Sales</h1>
<a href="index.html" class="bg-white px-3 py-1 rounded text-orange-500 font-semibold">Back</a>
</div>
<div class="p-4 max-w-4xl mx-auto grid md:grid-cols-2 gap-4">
<!-- Products List -->
<div class="bg-white rounded-lg shadow p-4">
<h2 class="font-bold mb-3">Products</h2>
<div id="productsList" class="space-y-2">Loading...</div>
</div>
<!-- Cart -->
<div class="bg-white rounded-lg shadow p-4">
<h2 class="font-bold mb-3">Cart</h2>
<div id="cartList" class="space-y-2 mb-3"></div>
<div class="border-t pt-3">
<div class="flex justify-between font-bold text-lg mb-3">
<span>Total:</span>
<span id="total">₱0</span>
</div>
<button onclick="checkout()" class="w-full bg-green-500 text-white py-2 rounded font-semibold">
Checkout
</button>
</div>
</div>
</div>

<script src="firebase-config.js"></script>
<script>
let products = [];
let cart = [];

// Load products from dhan-daily collection
db.collection('dhan-daily').onSnapshot(snapshot => {
  alert("✅ Connected! Products found: " + snapshot.size);
  products = [];
  snapshot.forEach(doc => {
    products.push({id: doc.id, ...doc.data()});
  });
  displayProducts();
}, err => {
  alert("❌ Firestore Error: " + err.message);
});

function displayProducts() {
  const div = document.getElementById('productsList');
  if(products.length === 0) {
    div.innerHTML = '<p class="text-gray-500">No products yet</p>';
    return;
  }
  div.innerHTML = products.map(p => `
    <div class="border rounded p-3 flex justify-between items-center">
      <div>
        <p class="font-semibold">${p.name}</p>
        <p class="text-sm text-gray-600">₱${p.price} | Stock: ${p.stock || 0}</p>
      </div>
      <button onclick="addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} 
        class="bg-orange-500 text-white px-3 py-1 rounded text-sm ${p.stock <= 0 ? 'opacity-50' : ''}">
        ${p.stock <= 0 ? 'Out of Stock' : 'Add'}
      </button>
    </div>
  `).join('');
}

function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  if(!product || product.stock <= 0) return;
  
  const existing = cart.find(c => c.id === productId);
  if(existing) {
    existing.qty++;
  } else {
    cart.push({id: productId, name: product.name, price: product.price, qty: 1});
  }
  displayCart();
}

function displayCart() {
  const div = document.getElementById('cartList');
  if(cart.length === 0) {
    div.innerHTML = '<p class="text-gray-500">Cart is empty</p>';
    document.getElementById('total').textContent = '₱0';
    return;
  }
  
  let total = 0;
  div.innerHTML = cart.map(item => {
    const subtotal = item.price * item.qty;
    total += subtotal;
    return `
      <div class="flex justify-between items-center border-b pb-2">
        <div>
          <p class="font-semibold">${item.name}</p>
          <p class="text-sm">₱${item.price} x ${item.qty}</p>
        </div>
        <button onclick="removeFromCart('${item.id}')" class="text-red-500 text-sm">Remove</button>
      </div>
    `;
  }).join('');
  
  document.getElementById('total').textContent = '₱' + total;
}

function removeFromCart(productId) {
  cart = cart.filter(c => c.id !== productId);
  displayCart();
}

async function checkout() {
  if(cart.length === 0) {
    alert('Cart is empty!');
    return;
  }

  const batch = db.batch();
  const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
  
  const saleRef = db.collection('sales').doc();
  batch.set(saleRef, {
    items: cart,
    total: total,
    date: new Date(),
    timestamp: Date.now()
  });

  cart.forEach(item => {
    const productRef = db.collection('dhan-daily').doc(item.id);
    batch.update(productRef, {
      stock: firebase.firestore.FieldValue.increment(-item.qty)
    });
  });

  try {
    await batch.commit();
    alert('✅ Sale completed! Total: ₱' + total);
    cart = [];
    displayCart();
  } catch(err) {
    alert('❌ Error: ' + err.message);
  }
}
</script>
</body>
</html>
