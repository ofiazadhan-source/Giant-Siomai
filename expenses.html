<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
    body {background:#f5f5f5;}
    .header {
      background: linear-gradient(135deg, #ff6b35, #ff8c65); 
      color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;
    }
    .header h1 {font-size:20px; font-weight:700;}
    .header button {
      background:white; color:#ff6b35; border:none; padding:8px 14px; 
      border-radius:8px; font-weight:600; cursor:pointer;
    }
    .container {padding:15px; max-width:1100px; margin:0 auto;}
    .notice {
      background:#e8f5e9; color:#2e7d32; padding:12px; border-radius:8px; 
      margin-bottom:15px; font-size:14px;
    }
    .add-btn {
      background:#ff6b35; color:white; border:none; padding:10px 16px; 
      border-radius:8px; font-weight:600; cursor:pointer; margin-bottom:15px;
    }
    .table {
      width:100%; background:white; border-radius:12px; overflow:hidden; 
      box-shadow:0 2px 8px rgba(0,0,0,0.08); border-collapse:collapse;
    }
    .table th {
      background:#fff9c4; padding:12px; text-align:left; font-weight:700; font-size:14px;
    }
    .table td {padding:10px; border-bottom:1px solid #eee;}
    .table input {
      width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:14px;
    }
    .btn-save {
      background:#4caf50; color:white; padding:10px 20px; border:none; 
      border-radius:8px; font-weight:600; cursor:pointer;
    }
    .btn-back {
      background:#666; color:white; padding:10px 20px; border:none; 
      border-radius:8px; font-weight:600; cursor:pointer; margin-right:10px;
    }
    .btn-del {
      background:#f44336; color:white; padding:6px 10px; border:none; 
      border-radius:6px; cursor:pointer;
    }
    .loading {text-align:center; padding:40px; color:#666;}
    .total-box {
      background:white; padding:15px; border-radius:12px; margin-bottom:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08); font-weight:600; font-size:16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💸 Expenses</h1>
    <button onclick="window.location.href='index.html'">← Back</button>
  </div>

  <div class="container">
    <div class="notice">💡 Ilog mo lahat ng expenses dito. Automatic compute ang total.</div>
    
    <div class="total-box" id="totalBox">
      Total Expenses: ₱0.00
    </div>

    <button class="add-btn" onclick="addExpense()">+ Add Expense</button>
    
    <div id="expensesList"><div class="loading">Loading...</div></div>
    
    <br>
    <button class="btn-back" onclick="window.location.href='index.html'">Back</button>
    <button class="btn-save" onclick="saveExpenses()">💾 Save All</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    let expensesArray = [];

    window.onload = loadExpenses;

    function loadExpenses() {
      db.collection("dhan-expenses").orderBy("date", "desc").get().then(snap => {
        expensesArray = [];
        snap.forEach(doc => {
          let e = doc.data();
          e.id = doc.id;
          expensesArray.push(e);
        });
        renderExpenses();
        updateTotal();
      });
    }

    function renderExpenses() {
      if(expensesArray.length === 0) {
        document.getElementById('expensesList').innerHTML = '<div class="loading">No expenses yet</div>';
        return;
      }
      let html = `<table class="table">
        <tr>
          <th>Date</th>
          <th>Item</th>
          <th>Amount</th>
          <th>Note</th>
          <th>Action</th>
        </tr>`;
      
      expensesArray.forEach(e => {
        html += `<tr>
          <td><input type="date" id="edate-${e.id}" value="${e.date}"></td>
          <td><input id="eitem-${e.id}" value="${e.item}"></td>
          <td><input type="number" id="eamt-${e.id}" value="${e.amount || 0}" oninput="updateTotal()"></td>
          <td><input id="enote-${e.id}" value="${e.note || ''}"></td>
          <td><button class="btn-del" onclick="deleteExpense('${e.id}')">Delete</button></td>
        </tr>`;
      });
      
      html += `</table>`;
      document.getElementById('expensesList').innerHTML = html;
    }

    function addExpense() {
      let date = new Date().toISOString().split('T')[0];
      db.collection("dhan-expenses").add({
        date: date, 
        item: "", 
        amount: 0, 
        note: ""
      }).then(loadExpenses);
    }

    async function saveExpenses() {
      if(!confirm("Save all changes?")) return;
      try {
        const batch = db.batch();
        let totalExpenses = 0;

        expensesArray.forEach(e => {
          let amt = parseFloat(document.getElementById(`eamt-${e.id}`).value) || 0;
          totalExpenses += amt;
          
          batch.update(db.collection("dhan-expenses").doc(e.id), {
            date: document.getElementById(`edate-${e.id}`).value,
            item: document.getElementById(`eitem-${e.id}`).value,
            amount: amt,
            note: document.getElementById(`enote-${e.id}`).value
          });
        });

        await batch.commit();
        alert("✅ Expenses saved!");
        loadExpenses();
        
      } catch(err) {
        alert("❌ Error: " + err.message);
      }
    }

    function deleteExpense(id) {
      if(confirm("Delete this expense?")) {
        db.collection("dhan-expenses").doc(id).delete().then(loadExpenses);
      }
    }

    function updateTotal() {
      let total = 0;
      expensesArray.forEach(e => {
        let amtEl = document.getElementById(`eamt-${e.id}`);
        if(amtEl) {
          total += parseFloat(amtEl.value) || 0;
        }
      });
      document.getElementById('totalBox').innerText = `Total Expenses: ₱${total.toFixed(2)}`;
    }
  </script>
</body>
</html>
